<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的第一个 AI 应用</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #667eea;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #333;
            font-weight: 500;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 5px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
            display: none;
        }

        .result.show {
            display: block;
            animation: fadeIn 0.5s;
        }

        .result h3 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .result p {
            color: #333;
            font-size: 18px;
            word-break: break-word;
        }

        .error {
            background: #fff3f3;
            border-left-color: #ff4444;
        }

        .error h3 {
            color: #ff4444;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🤖 我的第一个 AI 应用</h1>

    <div class="input-group">
        <label for="nameInput">请输入你的名字：</label>
        <input
                type="text"
                id="nameInput"
                placeholder="例如：张三"
                value="World"
        >
    </div>

    <div class="button-group">
        <button onclick="callSayHello()">🚀 调用 sayHello</button>
        <button onclick="callChatStream()">💬 流式对话</button>
        <button onclick="clearResult()">🧹 清空</button>
    </div>

    <div id="result" class="result">
        <h3>响应结果：</h3>
        <p id="responseText"></p>
    </div>

    <!-- ... existing code ... -->

</div>

<script>
    async function callSayHello() {
        const nameInput = document.getElementById('nameInput');
        const resultDiv = document.getElementById('result');
        const responseText = document.getElementById('responseText');

        const name = nameInput.value.trim() || 'World';

        try {
            resultDiv.classList.remove('error', 'show');
            void resultDiv.offsetWidth;

            const response = await fetch(`/api/sayHello?name=${encodeURIComponent(name)}`, {
                method: 'GET',
                headers: {
                    'Accept': 'application/json',
                    'Content-Type': 'application/json'
                }
            });

            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }

            const data = await response.text();

            resultDiv.classList.remove('error');
            resultDiv.classList.add('show');
            responseText.textContent = data;

        } catch (error) {
            resultDiv.classList.add('error', 'show');
            responseText.textContent = `❌ 请求失败：${error.message}`;
        }
    }

    function callChatStream() {
        const messageInput = document.getElementById('nameInput');
        const resultDiv = document.getElementById('result');
        const responseText = document.getElementById('responseText');

        const message = messageInput.value.trim() || '你好';

        resultDiv.classList.remove('error', 'show');
        void resultDiv.offsetWidth;
        resultDiv.classList.add('show');

        responseText.textContent = '';

        const eventSource = new EventSource(`/api/chat/stream?message=${encodeURIComponent(message)}`);

        eventSource.onmessage = function(event) {
            if (event.data === '[DONE]') {
                eventSource.close();
                return;
            }
            responseText.textContent += event.data;
        };

        eventSource.onerror = function(error) {
            resultDiv.classList.add('error');
            responseText.textContent += '\n❌ 连接错误';
            eventSource.close();
        };
    }

    function clearResult() {
        const resultDiv = document.getElementById('result');
        const responseText = document.getElementById('responseText');
        const nameInput = document.getElementById('nameInput');

        resultDiv.classList.remove('show', 'error');
        responseText.textContent = '';
        nameInput.value = 'World';
        nameInput.focus();
    }

    document.getElementById('nameInput').addEventListener('keypress', function (event) {
        if (event.key === 'Enter') {
            callSayHello();
        }
    });
</script>

</body>
</html>
