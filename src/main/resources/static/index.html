<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的第一个 AI 应用</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #667eea;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #333;
            font-weight: 500;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 5px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
            display: none;
        }

        .result.show {
            display: block;
            animation: fadeIn 0.5s;
        }

        .result h3 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .result p {
            color: #333;
            font-size: 18px;
            word-break: break-word;
        }

        .error {
            background: #fff3f3;
            border-left-color: #ff4444;
        }

        .error h3 {
            color: #ff4444;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .chat-container {
            margin-top: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            background: #fafafa;
            max-height: 400px;
            overflow-y: auto;
            text-align: left;
        }

        .chat-message {
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 10px;
            max-width: 80%;
            word-wrap: break-word;
        }

        .user-message {
            background: #667eea;
            color: white;
            margin-left: auto;
        }

        .ai-message {
            background: #e9ecef;
            color: #333;
        }

        .message-label {
            font-size: 12px;
            margin-bottom: 5px;
            opacity: 0.8;
        }

        .session-info {
            margin-top: 15px;
            padding: 10px;
            background: #fff3cd;
            border-radius: 5px;
            font-size: 14px;
            color: #856404;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🤖 我的第一个 AI 应用</h1>

    <div class="session-info" id="sessionInfo"></div>

    <div class="input-group">
        <label for="messageInput">请输入消息：</label>
        <input
                type="text"
                id="messageInput"
                placeholder="例如：你好，介绍一下你自己"
                value="你好"
        >
    </div>

    <div class="button-group">
        <button onclick="callChatStream()">💬 流式对话</button>
        <button onclick="callSayHello()">🚀 调用 sayHello</button>
        <button onclick="clearConversation()">🧹 清空对话</button>
        <button onclick="clearResult()">🗑️ 清空显示</button>
    </div>

    <div class="chat-container" id="chatContainer" style="display: none;">
        <!-- 聊天记录将在这里显示 -->
    </div>

    <div id="result" class="result">
        <h3>响应结果：</h3>
        <p id="responseText"></p>
    </div>

</div>

<script>
    let currentSessionId = null;
    let isStreaming = false;

    function updateSessionInfo() {
        const sessionInfo = document.getElementById('sessionInfo');
        if (currentSessionId) {
            sessionInfo.textContent = `当前会话 ID: ${currentSessionId.substring(0, 8)}...`;
            sessionInfo.style.display = 'block';
        } else {
            sessionInfo.style.display = 'none';
        }
    }

    async function callSayHello() {
        const nameInput = document.getElementById('messageInput');
        const resultDiv = document.getElementById('result');
        const responseText = document.getElementById('responseText');

        const name = nameInput.value.trim() || 'World';

        try {
            resultDiv.classList.remove('error', 'show');
            void resultDiv.offsetWidth;

            const response = await fetch(`/api/sayHello?name=${encodeURIComponent(name)}`, {
                method: 'GET',
                headers: {
                    'Accept': 'application/json',
                    'Content-Type': 'application/json'
                }
            });

            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }

            const data = await response.text();

            resultDiv.classList.remove('error');
            resultDiv.classList.add('show');
            responseText.textContent = data;

        } catch (error) {
            resultDiv.classList.add('error', 'show');
            responseText.textContent = `❌ 请求失败：${error.message}`;
        }
    }

    function callChatStream() {
        if (isStreaming) {
            alert('正在生成回复，请稍候...');
            return;
        }

        const messageInput = document.getElementById('messageInput');
        const message = messageInput.value.trim();

        if (!message) {
            alert('请输入消息内容');
            return;
        }

        isStreaming = true;
        messageInput.disabled = true;

        const chatContainer = document.getElementById('chatContainer');
        chatContainer.style.display = 'block';
        chatContainer.innerHTML = '';

        addUserMessage(message);

        const eventSource = new EventSource(`/api/chat/stream?message=${encodeURIComponent(message)}${currentSessionId ? '&sessionId=' + currentSessionId : ''}`);

        let aiMessageElement = null;
        let aiContent = '';

        eventSource.onmessage = function(event) {
            if (event.data === '[DONE]') {
                eventSource.close();
                isStreaming = false;
                messageInput.disabled = false;
                messageInput.focus();
                return;
            }

            if (!aiMessageElement) {
                aiMessageElement = addAiMessage('');
            }

            aiContent += event.data;
            aiMessageElement.querySelector('.message-content').textContent = aiContent;

            chatContainer.scrollTop = chatContainer.scrollHeight;
        };

        eventSource.onerror = function(error) {
            isStreaming = false;
            messageInput.disabled = false;

            if (!aiMessageElement) {
                aiMessageElement = addAiMessage('');
            }
            aiMessageElement.querySelector('.message-content').textContent += '\n❌ 连接错误';

            eventSource.close();
        };

        messageInput.value = '';
    }

    function addUserMessage(message) {
        const chatContainer = document.getElementById('chatContainer');
        const messageDiv = document.createElement('div');
        messageDiv.className = 'chat-message user-message';
        messageDiv.innerHTML = `
            <div class="message-label">你</div>
            <div class="message-content">${escapeHtml(message)}</div>
        `;
        chatContainer.appendChild(messageDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function addAiMessage(initialContent = '') {
        const chatContainer = document.getElementById('chatContainer');
        const messageDiv = document.createElement('div');
        messageDiv.className = 'chat-message ai-message';
        messageDiv.innerHTML = `
            <div class="message-label">AI 助手</div>
            <div class="message-content">${initialContent}</div>
        `;
        chatContainer.appendChild(messageDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
        return messageDiv;
    }

    function clearConversation() {
        if (!currentSessionId) {
            alert('当前没有活跃的会话');
            return;
        }

        if (!confirm('确定要清空当前对话历史吗？')) {
            return;
        }

        fetch(`/api/chat/clear?sessionId=${currentSessionId}`, {
            method: 'GET'
        }).then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    currentSessionId = null;
                    updateSessionInfo();
                    const chatContainer = document.getElementById('chatContainer');
                    chatContainer.innerHTML = '';
                    chatContainer.style.display = 'none';
                    alert('对话历史已清空');
                } else {
                    alert('清空失败：' + data.message);
                }
            })
            .catch(error => {
                alert('清空失败：' + error.message);
            });
    }

    function clearResult() {
        const resultDiv = document.getElementById('result');
        const responseText = document.getElementById('responseText');
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');

        resultDiv.classList.remove('show', 'error');
        responseText.textContent = '';
        chatContainer.innerHTML = '';
        chatContainer.style.display = 'none';
        messageInput.value = '你好';
        messageInput.disabled = false;
        isStreaming = false;
        messageInput.focus();
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    document.getElementById('messageInput').addEventListener('keypress', function (event) {
        if (event.key === 'Enter' && !isStreaming) {
            callChatStream();
        }
    });

    updateSessionInfo();
</script>

</body>
</html>
